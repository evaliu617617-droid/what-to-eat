<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="吃什么">
  <meta name="theme-color" content="#667eea">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  <title>今天吃什么</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overscroll-behavior: none;
    }
    
    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    
    .title {
      color: rgba(255,255,255,0.9);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    
    .result {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 48px 32px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    
    .food {
      font-size: 56px;
      margin-bottom: 8px;
    }
    
    .food-name {
      font-size: 28px;
      font-weight: 700;
      color: #333;
    }
    
    .btn {
      width: 100%;
      padding: 24px 32px;
      font-size: 22px;
      font-weight: 600;
      color: white;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 80px;
    }
    
    .btn:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.3);
    }
    
    .btn-icon {
      font-size: 28px;
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1 class="title">今天吃什么？</h1>
    
    <div class="result">
      <div class="food" id="foodEmoji">🍜</div>
      <div class="food-name" id="foodName">拉面</div>
    </div>
    
    <button class="btn" id="refreshBtn">
      <span class="btn-icon">🎲</span>
      <span>换一个</span>
    </button>
  </div>

  <script>
    const foods = [
      { emoji: "🍜", name: "拉面" },
      { emoji: "🍣", name: "寿司" },
      { emoji: "🍔", name: "汉堡" },
      { emoji: "🍕", name: "披萨" },
      { emoji: "🥗", name: "沙拉" },
      { emoji: "🍲", name: "火锅" },
      { emoji: "🍱", name: "便当" },
      { emoji: "🌮", name: "墨西哥卷" },
      { emoji: "🍛", name: "咖喱饭" },
      { emoji: "🥘", name: "煲仔饭" },
      { emoji: "🍝", name: "意面" },
      { emoji: "🥡", name: "炒饭" },
      { emoji: "🥟", name: "饺子" },
      { emoji: "🥪", name: "三明治" },
      { emoji: "🥙", name: "卷饼" },
      { emoji: "🍜", name: "米粉" },
      { emoji: "🦐", name: "小龙虾" },
      { emoji: "🍗", name: "炸鸡" }
    ];

    const foodEmoji = document.getElementById('foodEmoji');
    const foodName = document.getElementById('foodName');
    const refreshBtn = document.getElementById('refreshBtn');

    function pickFood() {
      const food = foods[Math.floor(Math.random() * foods.length)];
      foodEmoji.textContent = food.emoji;
      foodName.textContent = food.name;
    }

    refreshBtn.addEventListener('click', () => {
      pickFood();
    });

    // 初始化
    pickFood();

    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
