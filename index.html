      { emoji: "🍤", name: "天妇罗套餐", brands: ["日式料理店", "天妇罗小厨", "日本餐厅"], desc: "酥脆油炸，蘸酱清爽，日式经典" },
      { emoji: "🥘", name: "日式烧肉定食", brands: ["日式烧肉", "炭火烧肉", "日本料理"], desc: "炭火烧肉，米饭配菜，和风套餐" },
      
      // 甜点饮品 - 美团必点
      { emoji: "🧁", name: "下午茶套餐", brands: ["喜茶", "奈雪的茶", "星巴克", "瑞幸", "蜜雪冰城"], desc: "蛋糕奶茶，午后惬意，甜蜜时光" },
      { emoji: "🥤", name: "奶茶配炸鸡", brands: ["蜜雪冰城", "茶百道", "一点点", "古茗", "书亦烧仙草"], desc: "快乐组合，奶茶解腻，炸鸡过瘾" },
      { emoji: "🧇", name: "华夫饼套餐", brands: ["甜品店", "下午茶小馆", "冰淇淋店"], desc: "酥脆华夫，冰淇淋顶，甜蜜治愈" }
    ];

    const tips = [
      "💡 小贴士：配个溏心蛋更香哦",
      "💡 小贴士：加点辣椒油更有味",
      "💡 小贴士：记得配杯冰饮解腻",
      "💡 小贴士：和朋友分享更快乐",
      "💡 小贴士：饭后走走助消化",
      "💡 小贴士：试试加份小菜",
      "💡 小贴士：趁热吃口感最佳",
      "💡 小贴士：拍张照片记录美好"
    ];

    const foodEmoji = document.getElementById('foodEmoji');
    const foodName = document.getElementById('foodName');
    const foodBrand = document.getElementById('foodBrand');
    const foodDesc = document.getElementById('foodDesc');
    const tipEl = document.getElementById('tip');
    const refreshBtn = document.getElementById('refreshBtn');

    function pickFood() {
      // 添加 loading 动画
      refreshBtn.classList.add('loading');
      
      setTimeout(() => {
        const food = foods[Math.floor(Math.random() * foods.length)];
        const brand = food.brands[Math.floor(Math.random() * food.brands.length)];
        const tip = tips[Math.floor(Math.random() * tips.length)];
        
        foodEmoji.textContent = food.emoji;
        foodName.textContent = food.name;
        foodBrand.textContent = "📍 " + brand;
        foodDesc.textContent = food.desc;
        tipEl.textContent = tip;
        
        // 重新触发动画
        const result = document.querySelector('.result');
        result.style.animation = 'none';
        result.offsetHeight;
        result.style.animation = 'cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        
        const emoji = document.querySelector('.food');
        emoji.style.animation = 'none';
        emoji.offsetHeight;
        emoji.style.animation = 'emojiBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
        
        // 移除 loading 状态
        refreshBtn.classList.remove('loading');
      }, 300); // 300ms 延迟，增加期待感
    }

    refreshBtn.addEventListener('click', pickFood);
    pickFood();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
